# =============================================================================
# Project Underdog - Data Export Pipeline
# =============================================================================
# Runs on schedule and can be triggered manually
# Collects verified QA pairs and exports them for model training

name: Data Export Pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 06:00 UTC
  workflow_dispatch:
    inputs:
      export_limit:
        description: "Max number of records to export"
        required: false
        default: "5000"
        type: string

env:
  PYTHON_VERSION: "3.11"

jobs:
  export:
    name: Export Training Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project_underdog/requirements.txt

      - name: Export verified QA pairs
        run: |
          python -m project_underdog.main export --limit ${{ inputs.export_limit || '5000' }}
        env:
          UNDERDOG_DB_URL: sqlite+aiosqlite:///data/underdog.db

      - name: Upload exported datasets
        uses: actions/upload-artifact@v4
        with:
          name: training-datasets
          path: data/exports/
          retention-days: 30

      - name: Commit exports to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b data-exports 2>/dev/null || git checkout data-exports
          git add data/exports/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-export training data [skip ci]"
            git push origin data-exports --force
          fi
