# =============================================================================
# Caphlon - CI Pipeline
# =============================================================================
# Triggers on push/PR to main branch
# Runs: Caphlon CLI (Node) + Kovan Zekası (hive, Python stdlib)

name: CI Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hive:
    name: Kovan Zekası (hive, stdlib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run hive tests (no deps)
        run: bash scripts/test-hive.sh

  caphlon-cli:
    name: Caphlon CLI (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/caphlon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/caphlon/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests (cross-process discovery)
        run: npm test

      - name: Smoke — doctor çökmeden uçtan uca çalışır
        # CI'da çekirdekler (aider/qos/MiMo…) kurulu değil → doctor sağlığı için
        # exit 1 vermesi BEKLENİR. Bu yüzden sağlığı değil, komutun ÇÖKMEDEN
        # çalıştığını (özet satırını ürettiğini) doğrularız. Gerçek bir çökme
        # (Node exception, özet yok) job'ı kırar — sahte "geçti" yok.
        run: |
          set +e
          out=$(node bin/caphlon.js doctor 2>&1); code=$?
          set -e
          echo "$out"
          echo "$out" | grep -q "📊 Summary:" || { echo "HATA: doctor özet üretmeden çöktü"; exit 1; }
          echo "OK: doctor uçtan uca çalıştı (exit=$code; çekirdekler CI'da kurulu değil, !=0 beklenir)"

      - name: Smoke — `run` fails closed without a server
        run: |
          if node bin/caphlon.js run "ping" --no-autostart; then
            echo "BEKLENMEDİK: sunucu yokken run başarılı döndü" && exit 1
          else
            echo "OK: run sunucu olmadan exit!=0 ile düzgün başarısız oldu"
          fi

  core:
    name: core/*.py (security, mimo-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run core stdlib tests (no deps)
        run: |
          python3 core/test_security.py
          python3 core/test_mimo_features.py

  docker-hive:
    name: Docker Build (Kovan koordinatörü)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build hive image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.hive
          push: false
          load: true
          tags: caphlon-hive:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test hive image
        run: |
          docker run -d --name hive-test -p 8777:8777 caphlon-hive:latest
          sleep 5
          curl -sf http://localhost:8777/health
          docker stop hive-test
          docker rm hive-test
