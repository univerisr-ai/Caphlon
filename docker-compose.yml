# =============================================================================
# Project Underdog - Docker Compose
# =============================================================================
# Start: docker compose up -d
# Stop:  docker compose down

version: "3.9"

services:
  orchestrator:
    build: .
    container_name: underdog-orchestrator
    ports:
      - "${UNDERDOG_PORT:-8800}:8800"
    environment:
      - UNDERDOG_HOST=0.0.0.0
      - UNDERDOG_PORT=8800
      - UNDERDOG_DB_URL=sqlite+aiosqlite:///data/underdog.db
      - UNDERDOG_LOG_LEVEL=${UNDERDOG_LOG_LEVEL:-INFO}
      - UNDERDOG_LOG_FORMAT=${UNDERDOG_LOG_FORMAT:-text}
      - UNDERDOG_LLM_PROVIDER=${UNDERDOG_LLM_PROVIDER:-none}
      - UNDERDOG_LLM_API_KEY=${UNDERDOG_LLM_API_KEY:-}
    volumes:
      - underdog_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8800/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    container_name: underdog-worker
    profiles:
      - worker
    environment:
      - UNDERDOG_URL=ws://orchestrator:8800/ws
      - UNDERDOG_LLM_PROVIDER=${UNDERDOG_LLM_PROVIDER:-none}
      - UNDERDOG_LLM_API_KEY=${UNDERDOG_LLM_API_KEY:-}
    depends_on:
      orchestrator:
        condition: service_healthy
    command: ["python", "-m", "project_underdog.main", "worker", "--name", "docker-worker"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kovan Koordinatörü — "binlerce zayıf düğümün" buluştuğu merkez (saf stdlib).
  #   docker compose up -d hive
  # Düğümler:  caphlon hive join --id <ad> --server http://<host>:8777
  # ---------------------------------------------------------------------------
  hive:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: caphlon-hive
    ports:
      - "${HIVE_PORT:-8777}:8777"
    environment:
      - HIVE_HOST=0.0.0.0
      - HIVE_PORT=8777
      - HIVE_QUORUM=${HIVE_QUORUM:-3}
      - HIVE_FED_QUORUM=${HIVE_FED_QUORUM:-3}
      - HIVE_DATA=/data
    volumes:
      - hive_data:/data
    restart: unless-stopped

volumes:
  underdog_data:
    driver: local
  hive_data:
    driver: local
